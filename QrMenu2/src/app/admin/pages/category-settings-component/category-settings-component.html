<div class="admin-page">
    <div class="admin-page-header">
        <div>
            <h2 class="admin-page-title">Kategori Yönetimi</h2>
            <p class="admin-page-subtitle">Kategorileri görüntüleyin, düzenleyin ve menü yapısını güncel tutun.</p>
        </div>
    </div>

    <div class="admin-grid">
        <section class="admin-panel admin-table-panel">
            <div class="panel-head">
                <span class="panel-kicker">Kategoriler</span>
                <h3>Kayıt listesi</h3>
            </div>

            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Kategori adı</th>
                            <th>İşlem</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let category of categories">
                            <td>{{category.categoryId}}</td>
                            <td>{{category.categoryName}}</td>
                            <td class="actions-cell">
                                <button type="button" class="btn btn-warning" (click)="SelectCategory(category)">Güncelle</button>
                                <button type="button" class="btn btn-danger" (click)="DeleteCategory(category)">Sil</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="admin-panel admin-form-panel">
            <div class="panel-head">
                <span class="panel-kicker">Düzenleme</span>
                <h3>Seçili kategoriyi güncelle</h3>
            </div>

            <form [formGroup]="categoryUpdateForm" class="admin-form">
                <div class="field-group">
                    <label for="categoryId">ID</label>
                    <input id="categoryId" type="number" class="form-control" readonly formControlName="categoryId" />
                </div>

                <div class="field-group">
                    <label for="categoryNameUpdate">Kategori adı</label>
                    <input id="categoryNameUpdate" type="text" class="form-control" formControlName="categoryName" />
                </div>

                <div class="form-btn-group">
                    <button type="button" class="btn btn-primary" (click)="updateCategory()">Kaydet</button>
                    <button type="button" class="btn btn-secondary" (click)="cancelSelect()">Vazgeç</button>
                </div>
            </form>
        </section>
    </div>
</div>
