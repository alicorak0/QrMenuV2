<div class="container mt-4">
    <h2 class="content-title">Category Management</h2>

    <div class="flex-row">
        <!-- Solda tablo -->
        <div class="flex-col flex-col-left">
            <div class="card">
                <div class="card-header bg-primary text-white">Kategoriler</div>
                <div class="card-body p-0">
                    <div class="table-wrapper">
                        <table class="table table-striped mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>İd</th>
                                    <th>Name</th>
                                    <th>İşlem</th>

                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let category of categories">
                                    <td>{{category.categoryId}}</td>
                                    <td>{{category.categoryName}}</td>

                                    <td>
                                        <button class="btn btn-sm btn-warning me-1"
                                            (click)="SelectCategory(category)">Güncelle</button>
                                        <button class="btn btn-sm btn-danger"
                                            (click)="DeleteCategory(category)">Sil</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sağda form -->
        <div class="flex-col flex-col-right">
            <div class="card">
                <div class="card-header bg-success text-white">Seçilen Kategoriyi Güncelle</div>
                <div class="card-body">
                    <form [formGroup]="categoryUpdateForm">
                        <div class="mb-3">
                            <label class="form-label">ID</label>
                            <input type="number" class="form-control" readonly formControlName="categoryId" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" formControlName="categoryName" />
                        </div>
                

                         <div class="form-btn-group">

                             <button type="button" class="btn btn-success me-2" (click)="updateCategory()">Kaydet</button>
                             <button type="button" class="btn btn-secondary" (click)="cancelSelect()">Vazgeç</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
