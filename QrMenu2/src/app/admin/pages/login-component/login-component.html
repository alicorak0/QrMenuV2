<div class="login">
   <img src="/adminloginbackground.jpg.jpeg" alt="login image" class="login__img">
   <div class="login__overlay"></div>

   <form [formGroup]="loginForm" action="" class="login__form">
      <div class="login__eyebrow">Quattro Admin</div>
      <h1 class="login__title">Yönetici Girişi</h1>
      <p class="login__subtitle">Menü, kategori ve ürün yönetimini tek panelden kontrol edin.</p>

      <div class="login__content">
         <div class="login__box">
            <i class="ri-user-3-line login__icon"></i>
          <div class="login__box-input">
               <input type="email" formControlName="email" type="email" required class="login__input" id="login-email"
                  placeholder=" ">
               <label for="login-email" class="login__label">E-posta</label>
            </div>
         </div>

         <div class="login__box">
            <i class="ri-lock-2-line login__icon"></i>

            <div class="login__box-input">
               <input type="password" formControlName="password" required class="login__input" id="login-pass" placeholder=" ">
               <label for="login-pass" class="login__label">Şifre</label>
               <i class="ri-eye-off-line login__eye" id="login-eye"></i>
            </div>
         </div>
      </div>

      <div class="login__check">
         <div class="login__check-group">
            <input type="checkbox" class="login__check-input" id="login-check">
            <label for="login-check" class="login__check-label">Beni hatırla</label>
         </div>

         <a class="login__forgot">Şifremi unuttum</a>
      </div>

      <button type="submit" (click)="login()" class="login__button">Giriş Yap</button>

      <!-- <p class="login__register">
                  Don't have an account? <a href="#">Register</a>
               </p> -->
   </form>
</div>
