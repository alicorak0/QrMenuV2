<div class="admin-page">
    <div class="admin-page-header">
        <div>
            <h2 class="admin-page-title">Yeni Ürün</h2>
            <p class="admin-page-subtitle">Menüye eklenecek ürün bilgilerini, kategorisini ve görselini yönetin.</p>
        </div>
    </div>

    <section class="admin-panel admin-form-panel">
        <div class="panel-head">
            <span class="panel-kicker">Ürün Ekle</span>
            <h3>Ürün bilgileri</h3>
        </div>

        <form [formGroup]="productAddForm" class="admin-form">
            <div class="admin-form-grid">
                <div class="field-group">
                    <label for="categorySelect">Kategori</label>
                    <select id="categorySelect" name="category" class="form-control" formControlName="categoryId">
                        <option [ngValue]="null">Seçiniz</option>
                        <option *ngFor="let cat of allCategories" [ngValue]="cat.categoryId">
                            {{ cat.categoryName }}
                        </option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="productName">Ürün adı</label>
                    <input id="productName" type="text" name="productName" class="form-control" formControlName="productName" />
                </div>

                <div class="field-group field-group-full">
                    <label for="description">Açıklama</label>
                    <input id="description" type="text" name="description" class="form-control" formControlName="description" />
                </div>

                <div class="field-group field-group-full">
                    <label for="tooltip">Kısa bilgi</label>
                    <input id="tooltip" type="text" name="tooltip" class="form-control" formControlName="tooltip" />
                </div>

                <div class="field-group">
                    <label for="price">Fiyat</label>
                    <input id="price" type="number" name="price" class="form-control" formControlName="price" />
                </div>

                <div class="field-group field-group-full">
                    <label>Ürün görseli</label>
                    <div class="file-picker-row">
                        <button type="button" class="btn btn-secondary" (click)="fileInput.click()">Görsel Seç</button>
                        <span class="file-name" *ngIf="selectedFile">{{ selectedFile.name }}</span>
                    </div>
                    <input type="file" hidden #fileInput (change)="onFileSelected($event)">
                </div>
            </div>

            <div class="form-btn-group">
                <button type="button" (click)="add()" class="btn btn-primary">Kaydet</button>
                <button type="button" class="btn btn-secondary" (click)="productAddForm.reset()">Temizle</button>
            </div>
        </form>
    </section>
</div>
