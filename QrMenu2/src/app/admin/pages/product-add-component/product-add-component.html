<div class="container mt-4">
    <div class="row">
        <!-- Sağda form: Seçilen araç için update -->
        <div class="col-md-6 offset-md-2">
            <div class="card">
                <div class="card-header bg-success text-white">
                    Araç Ekleme
                </div>
                <div class="card-body">
                    <form [formGroup]="productAddForm">

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-control" formControlName="categoryId">
                                <option [ngValue]="null">Seçiniz</option>
                                <option *ngFor="let cat of allCategories" [ngValue]="cat.categoryId">
                                    {{ cat.categoryName }}
                                </option>
                            </select>
                        </div>


                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="productName" class="form-control" formControlName="productName" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <input type="text" name="description" class="form-control" formControlName="description" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tooltip</label>
                            <input type="text" name="tooltip" class="form-control" formControlName="tooltip" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number" name="price" class="form-control" formControlName="price" />
                        </div>

                        <!-- ✅ IMAGE SEÇME (gizli input, preview yok) -->
                        <div class="mb-3">
                            <label class="form-label">Resim</label><br>
                            <button type="button" class="btn btn-secondary" (click)="fileInput.click()">
                                📷 Resim Seç
                            </button>
                            <span class="file-name" *ngIf="selectedFile">{{ selectedFile.name }}</span>
                            <!-- Dosya adı burada gösteriliyor -->

                            <input type="file" hidden #fileInput (change)="onFileSelected($event)">
                        </div>
                        <button type="button" (click)="add()" class="btn btn-success me-2">Kaydet</button>
                        <button type="button" class="btn btn-secondary">Vazgeç</button>
                    </form>
                </div>
            </div>

        </div>

    </div>
</div>
